<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Client | Beyond20 CRM</title>
    
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/6ae403_7c8c0b7a789c49b5882443dc4ce55cf9~mv2.jpg/v1/fill/w_32,h_32/B20%20Logo.png">
    <link rel="apple-touch-icon" href="https://static.wixstatic.com/media/6ae403_7c8c0b7a789c49b5882443dc4ce55cf9~mv2.jpg/v1/fill/w_180,h_180/B20%20Logo.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        h2 { color: #333; margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        h3 { font-size: 0.9rem; color: #007bff; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #eee; padding-top: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 0.85rem; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:hover { background-color: #218838; }
        .nav-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 0.9rem; }
        .nav-links a { color: #007bff; text-decoration: none; }
        .logo-container { display: flex; justify-content: center; margin-bottom: 25px; }
        .logo { height: 120px; width: auto; object-fit: contain; }
    </style>
</head>
<body>
<div class="form-container">
    <div class="logo-container">
        <a href="index.html">
            <img src="https://static.wixstatic.com/media/6ae403_7c8c0b7a789c49b5882443dc4ce55cf9~mv2.jpg/v1/fill/w_318,h_316,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/B20%20Logo_edited_edited.jpg" alt="Beyond20 Logo" class="logo">
        </a>
    </div>
    
    <h2 id="pageTitle">Add Client Profile</h2>
    
    <form id="clientForm">
        <h3>Business Details</h3>
        <div class="grid">
            <div class="field full-width">
                <label>Company Name *</label>
                <input type="text" id="company_name" placeholder="e.g. Global Foods Ltd" required>
            </div>
            <div class="field full-width">
                <label>Company Website (for Logo & Research)</label>
                <input type="text" id="website_url" placeholder="e.g. beyond20.com">
            </div>
            <div class="field">
                <label>Country</label>
                <input type="text" id="country" placeholder="UK, USA, etc.">
            </div>
            <div class="field">
                <label>Number of Employees</label>
                <input type="number" id="number_of_employees">
            </div>
            <div class="field">
                <label>Estimated Annual Revenue</label>
                <input type="text" id="estimated_revenue" placeholder="e.g. $10M">
            </div>
            <div class="field">
                <label>Status</label>
                <select id="status">
                    <option value="Lead">Lead</option>
                    <option value="Active">Active</option>
                    <option value="Former">Former</option>
                </select>
            </div>
            <div class="field full-width">
                <label>Office Address</label>
                <textarea id="address" rows="2"></textarea>
            </div>
        </div>

        <h3>Key Contact</h3>
        <div class="grid">
            <div class="field">
                <label>Contact Name</label>
                <input type="text" id="key_contact_name">
            </div>
            <div class="field">
                <label>Position</label>
                <input type="text" id="position" placeholder="e.g. CEO or Marketing Manager">
            </div>
            <div class="field">
                <label>Email Address</label> 
                <input type="email" id="client_email" placeholder="name@company.com">
            </div>
            <div class="field">
                <label>Mobile Number</label>
                <input type="text" id="mobile_number">
            </div>
            <div class="field full-width">
                <label>LinkedIn Profile URL</label>
                <input type="url" id="linkedin_profile">
            </div>
        </div>

        <h3>Project & CRM Tracking</h3>
        <div class="grid">
            <div class="field">
                <label>Contract Revenue</label> 
                <input type="text" id="project_revenue">
            </div>
            <div class="field">
                <label>B20 Fee</label> 
                <input type="text" id="b20_fee">
            </div>
            <div class="field">
                <label>Referring Partner</label> 
                <input type="text" id="referring_partner">
            </div>
            <div class="field">
                <label>B20 Consultant Partner</label> 
                <input type="text" id="b20_consultant_partner">
            </div>
            <div class="field">
                <label>Referral Fee</label> 
                <input type="text" id="referral_fee">
            </div>
            <div class="field full-width">
                <label>B20 members touched by client</label> 
                <textarea id="b20_members_touched" rows="2"></textarea>
            </div>
            <div class="field">
                <label>Last Contacted</label>
                <input type="date" id="last_contacted">
            </div>
            <div class="field">
                <label>Next Contact Date</label>
                <input type="date" id="next_contact" style="background-color: #fff9e6;">
            </div>
            <div class="field full-width">
                <label>Project Details</label>
                <textarea id="project_details" rows="2"></textarea>
            </div>
            <div class="field full-width">
                <label>Social Commentary</label>
                <textarea id="social_commentary" rows="2"></textarea>
            </div>
        </div>

        <div class="field">
            <label>Probability (%)</label>
            <select id="probability">
                <option value="100">100% (Closed/Won)</option>
                <option value="90">90% (Contract Sent)</option>
                <option value="50">50% (Proposal Made)</option>
                <option value="25">25% (Initial Lead)</option>
                <option value="10">10% (Cold Outreach)</option>
            </select>
        </div>
        <button type="submit" id="saveBtn">Save Client to The BEYOND20 Network CRM</button>
    </form>

    <div class="nav-links">
        <a href="index.html">← Back to Directory</a>
        <span>* Required field</span>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://zghuzprolilfrrwnerzj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_SckBRAKGy7pw9WkNyY5New_gChTSnuz';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const clientId = urlParams.get('id');

    async function init() {
        const { data: { session } } = await db.auth.getSession();
        if (!session) {
            window.location.href = `login.html?from=${encodeURIComponent(window.location.pathname + window.location.search)}`;
            return;
        }
        if (clientId) {
            document.getElementById('pageTitle').innerText = "Edit Client Profile";
            document.getElementById('saveBtn').innerText = "Update Client Details";
            loadClientData();
        }
    }

    async function loadClientData() {
        const { data, error } = await db.from('clients').select('*').eq('id', clientId).single();
        if (error) return console.error('Error fetching client:', error);

        if (data) {
            document.getElementById('company_name').value = data.company_name || '';
            document.getElementById('website_url').value = data.website_url || ''; // LOAD WEBSITE
            document.getElementById('country').value = data.country || '';
            document.getElementById('number_of_employees').value = data.number_of_employees || '';
            document.getElementById('estimated_revenue').value = data.estimated_revenue || '';
            document.getElementById('status').value = data.Status || 'Lead';
            document.getElementById('address').value = data.address || '';
            document.getElementById('key_contact_name').value = data.key_contact_name || '';
            document.getElementById('position').value = data.position || '';
            document.getElementById('client_email').value = data.client_email || '';
            document.getElementById('mobile_number').value = data.mobile_number || '';
            document.getElementById('linkedin_profile').value = data.linkedin_profile || '';
            document.getElementById('project_revenue').value = data.project_revenue || '';
            document.getElementById('b20_fee').value = data.b20_fee || '';
            document.getElementById('referring_partner').value = data.referring_partner || '';
            document.getElementById('b20_consultant_partner').value = data.b20_consultant_partner || '';
            document.getElementById('referral_fee').value = data.referral_fee || '';
            document.getElementById('b20_members_touched').value = data.b20_members_touched || '';
            document.getElementById('last_contacted').value = data.last_contacted || '';
            document.getElementById('next_contact').value = data.next_contact || '';
            document.getElementById('project_details').value = data.project_details || '';
            document.getElementById('social_commentary').value = data.social_commentary || '';
            document.getElementById('probability').value = data.probability || '25';
        }
    }

    const form = document.getElementById('clientForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.innerText = 'Processing...';
        btn.disabled = true;

        const cleanPrice = (id) => {
            const val = document.getElementById(id).value;
            return val ? val.replace(/[^0-9.]/g, '') : null;
        };

        const clientData = {
            company_name: document.getElementById('company_name').value,
            website_url: document.getElementById('website_url').value, // SAVE WEBSITE
            country: document.getElementById('country').value,
            number_of_employees: document.getElementById('number_of_employees').value || null,
            estimated_revenue: document.getElementById('estimated_revenue').value,
            Status: document.getElementById('status').value,
            address: document.getElementById('address').value,
            key_contact_name: document.getElementById('key_contact_name').value,
            position: document.getElementById('position').value,
            client_email: document.getElementById('client_email').value,
            mobile_number: document.getElementById('mobile_number').value,
            linkedin_profile: document.getElementById('linkedin_profile').value,
            project_revenue: cleanPrice('project_revenue'), 
            project_details: document.getElementById('project_details').value,
            last_contacted: document.getElementById('last_contacted').value || null,
            next_contact: document.getElementById('next_contact').value || null,
            social_commentary: document.getElementById('social_commentary').value,
            probability: document.getElementById('probability').value,
            b20_fee: document.getElementById('b20_fee').value,
            referring_partner: document.getElementById('referring_partner').value,
            b20_consultant_partner: document.getElementById('b20_consultant_partner').value,
            referral_fee: document.getElementById('referral_fee').value,
            b20_members_touched: document.getElementById('b20_members_touched').value
        };

        let result = clientId ? 
            await db.from('clients').update(clientData).eq('id', clientId) : 
            await db.from('clients').insert([clientData]);

        if (result.error) {
            alert('Error: ' + result.error.message);
            btn.disabled = false;
            btn.innerText = 'Try Again';
        } else {
            alert('Success!');
            window.location.href = 'index.html';
        }
    });

    init();
</script>
</body>
</html>
