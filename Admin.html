<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMCG CRM - Client View</title>
    <style>
        /* Basic mobile-friendly styling */
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; }
        .status { color: #27ae60; font-weight: bold; }
    </style>
</head>
<hr>
    <h3>Consultancy Meeting Notes</h3>
    <textarea id="noteInput" rows="4" style="width: 100%;" placeholder="e.g. Discussed SKU expansion for Organic Snacks Co..."></textarea>
    <br><br>
    <button onclick="saveNote()" style="padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px;">
        Save Note with Date Stamp
    </button>

<body>

    <div id="app">
        <h1>My FMCG Clients</h1>
        <div id="client-list">Loading Clients...</div>
    </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
          apiKey: "AIzaSyARaMk2bEa3ptDQzCn88RpH56stHe3s-7Q",
  authDomain: "b20-client-crm.firebaseapp.com",
  projectId: "b20-client-crm",
  storageBucket: "b20-client-crm.firebasestorage.app",
  messagingSenderId: "24838104458",
  appId: "1:24838104458:web:e85e8cd1b79129dd101473",
  measurementId: "G-0DX8WH3JGW"
    };

    // 1. Initialize Firebase inside the module
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. Attach the logic to the button directly
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const noteText = document.getElementById('noteInput').value;
        const timestamp = new Date().toLocaleString();

        if (!noteText) { alert("Please enter a note!"); return; }

        try {
            const querySnapshot = await getDocs(collection(db, "clients"));
            if (querySnapshot.empty) {
                alert("Connected, but no clients found in your database.");
                return;
            }

            const clientRef = doc(db, "clients", querySnapshot.docs[0].id);
            await updateDoc(clientRef, {
                meetingNotes: arrayUnion({ note: noteText, date: timestamp })
            });
            alert("Success! Note saved at " + timestamp);
            document.getElementById('noteInput').value = "";
        } catch (e) {
            alert("Error: " + e.message);
        }
    });
</script>

<hr>
<h3>Consultancy Meeting Notes</h3>
<textarea id="noteInput" rows="4" style="width: 100%;" placeholder="Enter notes..."></textarea>
<br><br>
<button id="saveBtn" style="padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 5px;">
    Save Note with Date Stamp
</button>
</body>
</html>
